{{define "content"}}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Giriş Yap</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="/web-login" novalidate onsubmit="console.log('Form submitting!', event); return true;">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Şifre</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary" onclick="console.log('Button clicked!'); return true;">Giriş Yap</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <p>Hesabın yok mu? <a href="/register">Kayıt Ol</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
